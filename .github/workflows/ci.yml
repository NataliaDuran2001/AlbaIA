name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones previas del mismo ref si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint informativo: reporta problemas pero no bloquea el CI (hay lint pendiente en i18n).
      # Quitar continue-on-error cuando el lint pase limpio para convertirlo en gate.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # Type-check es el gate real: si falla, el CI falla.
      - name: Type-check
        if: always()
        run: npm run type-check
